name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

# OIDC authentication permissions
permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: 'fabricio-rojas'
  AZURE_SUBSCRIPTION_ID: '544c4fa2-0d6f-490c-a407-89d4f9be2c84'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      # Zipping the files ensures a clean, fast deployment to App Service
      - name: Zip artifact for deployment
        run: zip -r release.zip . -x ".git/*" ".github/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: release.zip
